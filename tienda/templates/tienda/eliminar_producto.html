{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
  <h2 class="text-danger">Eliminar producto</h2>
  <p>¿Estás seguro de que querés eliminar <strong>{{ producto.nombre }}</strong>?</p>

  <form method="post">
    {% csrf_token %}
    <div class="d-flex gap-2">
      <a href="{% url 'tienda:todos_productos' %}" class="btn btn-secondary">Cancelar</a>
      <button type="submit" class="btn btn-danger">Eliminar</button>
    </div>
  </form>
</div>
{% endblock %}
